<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContactUs</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#f4f6f9;
    background-image: url('https://static.vecteezy.com/system/resources/thumbnails/051/166/491/small/communication-concept-with-email-message-box-and-contacts-icons-e-mail-marketing-customer-support-counseling-and-support-hotline-connection-with-modern-network-technology-contact-us-free-photo.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

.contact-section{
    padding:50px 10%;
}

.contact-section h2{
    text-align:center;
    margin-bottom:40px;
    font-size:32px;
}

.contact-container{
    display:flex;
    flex-wrap:wrap;
    gap:40px;
}

.contact-info{
    flex:1;
    min-width:300px;
}

.contact-info p{
    margin:12px 0;
    font-size:16px;
}

.contact-form{
    flex:1;
    min-width:300px;
    background:#fff;
    padding:30px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.contact-form button{
    padding:10px 20px;
    background:#007bff;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.contact-form button:hover{
    background:#0056b3;
}

.success-message{
    color:green;
    margin-top:10px;
    font-weight:bold;
    display:none;
}

.map{
    margin-top:40px;
}

iframe{
    width:100%;
    height:300px;
    border:0;
    border-radius:8px;
}
</style>
</head>

<body>

<section class="contact-section">
    <h2>Contact Us</h2>

    <div class="contact-container">

        <div class="contact-form">
          <center>
            <form id="contactForm">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="text" placeholder="Subject" required>
                <textarea rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
                <div class="success-message" id="successMsg">
                    Your response is submitted!
                </div>
            </form>
          </center>
        </div>

    </div>

    <div class="map">
        <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3806.513556649215!2d78.474092!3d17.385044!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bcdbf2a1c0b6d5b%3A0x1234567890abcdef!2sHyderabad!5e0!3m2!1sen!2sin!4v1690000000000"
        allowfullscreen="10"
        loading="lazy">
        </iframe>
    </div>

    <div class="contact-info">
        <p><strong>Address:</strong> Ram nagar, karimnagar, Telangana, India</p>
        <p><strong>Phone:</strong> +91 98765 43210</p>
        <p><strong>Email:</strong> guardianlink@gmail.com</p>
    </div>
</section>

<script>
document.getElementById("contactForm").addEventListener("submit", function(event){
    event.preventDefault();
    document.getElementById("successMsg").style.display = "block";
    this.reset();
});
</script>

</body>
</html>
