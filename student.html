<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardian Link - Student Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    background:#1e3a8a;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
    position:relative;
}

.back-btn{
    position:absolute;
    left:15px;
    top:12px;
    background:white;
    color:#1e3a8a;
    border:none;
    padding:6px 12px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    width:650px;
    background:#ffffffee;
    margin:40px auto;
    padding:25px;
    border-radius:10px;
}

h2{
    text-align:center;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#f4f6f9;
    margin:10px 0;
    padding:12px;
    border-radius:6px;
    border-left:6px solid #1e3a8a;
}

footer{
    background:#1e3a8a;
    color:white;
    text-align:center;
    padding:10px;
    margin-top:auto;
}
</style>
</head>

<body>

<header>
<button class="back-btn" onclick="goBack()">← Back</button>
Guardian Link - Student Dashboard
</header>

<div class="container">

<h2 id="studentTitle">Welcome Student</h2>

<h3>Your Roadmap</h3>
<ul id="roadmapList"></ul>

</div>

<footer>
© 2026 Guardian Link
</footer>

<script>

/* 🎯 Default Roadmap */
const defaultRoadmap = [
  "Phase 1: Academic Foundation",
  "Phase 2: Technical Skills Development",
  "Phase 3: Communication & Soft Skills",
  "Phase 4: Internship / Practical Exposure",
  "Phase 5: Project Development",
  "Phase 6: Placement Preparation"
];


/* Load roadmap automatically when page loads */
window.onload = function(){
    loadRoadmap();
}


/* Display roadmap */
function loadRoadmap(){
    const roadmapList = document.getElementById("roadmapList");
    roadmapList.innerHTML = "";

    defaultRoadmap.forEach(phase => {
        let li = document.createElement("li");
        li.innerHTML = "✔ " + phase;
        roadmapList.appendChild(li);
    });
}


/* Back to Login */
function goBack(){
    window.location.href = "login.html";
}

</script>

</body>
</html>
